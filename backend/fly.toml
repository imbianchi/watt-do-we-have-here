# Fly.io config — rename `app` to a globally-unique name before `flyctl launch`.
# Secrets (DATABASE_URL, SECRET_KEY, ENCRYPTION_KEY, ALLOWED_ORIGINS) are set
# with `flyctl secrets set ...` — never commit them here.

app = "watt-api"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  POLL_INTERVAL = "30"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
